<!DOCTYPE html>
<html lang="en">
<head>
  <!-- PWA -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#ffffff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="apple-touch-icon" href="/icon-192.png">

  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="referrer" content="no-referrer" />
  <title>Wake Patativa PC</title>

  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
           text-align: center; margin: 8vh 6vw; color: #222; background:#fff; }
    h1 { font-size: 22px; margin-bottom: 18px; }
    #btn { font-size: 24px; padding: 18px 36px; border-radius: 14px; border: 0; cursor: pointer; }
    #msg { margin-top: 14px; font-size: 14px; color: #666; min-height: 1.5em; }
    #tools { margin-top: 22px; font-size: 13px; }
    #tools a { color: #06c; text-decoration: none; }
    #tools a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <h1>Patativa PC</h1>
  <button id="btn">Loading…</button>
  <div id="msg"></div>
  <div id="tools">
    <a href="#" id="resetToken">Reset token</a>
  </div>

  <script>
  // ====== CONFIG ======
  const GIST_ID  = "348b9500d9c086676df75e1aa3465f4a";
  const STAR_URL = `https://api.github.com/gists/${GIST_ID}/star`;
  // =====================

  (function () {
    const btn = document.getElementById("btn");
    const msg = document.getElementById("msg");
    const resetLink = document.getElementById("resetToken");

    let isStarred = false;
    let tokenCache = null;

    // --- Token handling: localStorage → URL (one-time) ---
    function parseTokenFromUrl() {
      const url = new URL(window.location.href);
      let token = null;
      if (url.hash) {
        const hashParams = new URLSearchParams(url.hash.slice(1));
        token = hashParams.get('gh_token');
      }
      if (!token) token = url.searchParams.get('gh_token');
      return token ? token.trim() : null;
    }

    function clearTokenFromUrl() {
      const url = new URL(window.location.href);
      url.searchParams.delete('gh_token');
      if (url.hash) {
        const hp = new URLSearchParams(url.hash.slice(1));
        hp.delete('gh_token');
        url.hash = hp.toString() ? '#' + hp.toString() : '';
      }
      window.history.replaceState({}, document.title, url.toString());
    }

    function getToken() {
      if (tokenCache) return tokenCache;

      // 1) Stored
      try {
        const stored = localStorage.getItem('gh_gist_token');
        if (stored) {
          tokenCache = stored.trim();
          return tokenCache;
        }
      } catch {}

      // 2) URL (one-time)
      const fromUrl = parseTokenFromUrl();
      if (fromUrl) {
        try { localStorage.setItem('gh_gist_token', fromUrl); } catch {}
        tokenCache = fromUrl;
        clearTokenFromUrl();
        return tokenCache;
      }

      return null;
    }

    function resetToken() {
      try { localStorage.removeItem('gh_gist_token'); } catch {}
      tokenCache = null;
      msg.textContent = "Token cleared. Reload with #gh_token=YOUR_TOKEN.";
      btn.disabled = true;
    }

    // --- UI ---
    function renderButton() {
      btn.disabled = false;
      if (isStarred) {
        btn.textContent = "Awaking PC";
        btn.style.background = "#7cf58e";
      } else {
        btn.textContent = "Send WAKE Signal";
        btn.style.background = "#ff8c8c";
      }
    }

    function showTokenHintIfMissing() {
      const hasToken = !!getToken();
      if (!hasToken) {
        btn.disabled = true;
        msg.textContent = "No token saved. Open with #gh_token=YOUR_TOKEN once.";
      } else {
        msg.textContent = "";
        btn.disabled = false;
      }
    }

    // --- API calls ---
    async function getStarStatus() {
      msg.textContent = "";
      const token = getToken();
      const headers = {
        "Accept": "application/vnd.github+json",
        "X-GitHub-Api-Version": "2022-11-28",
        "User-Agent": "wolpoll/1.0 (web)"
      };
      if (token) headers["Authorization"] = `Bearer ${token}`;

      try {
        const res = await fetch(STAR_URL + "?t=" + Date.now(), {
          method: "GET",
          headers,
          cache: "no-store",
        });
        if (res.status === 204) {
          isStarred = true;
        } else if (res.status === 404) {
          isStarred = false;
        } else if (res.status === 401) {
          isStarred = false;
          msg.textContent = "401 Unauthorized — token invalid/expired or lacks Gist scope.";
        } else {
          isStarred = false;
          msg.textContent = `Unexpected status: ${res.status} ${res.statusText}`;
        }
        renderButton();
      } catch (e) {
        btn.disabled = true;
        msg.textContent = "Failed to query star status. Check connectivity.";
        console.error(e);
      } finally {
        showTokenHintIfMissing();
      }
    }

    async function starGist() {
      const token = getToken();
      if (!token) {
        msg.textContent = "No token available.";
        return;
      }
      btn.disabled = true;
      msg.textContent = "Starring…";
      try {
        const res = await fetch(STAR_URL, {
          method: "PUT",
          headers: {
            "Accept": "application/vnd.github+json",
            "X-GitHub-Api-Version": "2022-11-28",
            "Authorization": `Bearer ${token}`,
            "User-Agent": "wolpoll/1.0 (web)"
          },
          cache: "no-store"
        });
        if (res.status === 204) {
          isStarred = true;
          renderButton();
          msg.textContent = "Starred!";
        } else if (res.status === 401) {
          msg.textContent = "401 Unauthorized — token invalid/expired or lacks scope.";
        } else if (res.status === 404) {
          msg.textContent = "404 Not Found — wrong Gist ID or token lacks access.";
        } else {
          const text = await res.text();
          msg.textContent = `Failed to star: HTTP ${res.status} ${res.statusText} — ${text}`;
        }
      } catch (e) {
        msg.textContent = "Network error while starring.";
        console.error(e);
      } finally {
        btn.disabled = false;
      }
    }

    async function unstarGist() {
      const token = getToken();
      if (!token) {
        msg.textContent = "No token available.";
        return;
      }
      btn.disabled = true;
      msg.textContent = "Unstarring…";
      try {
        const res = await fetch(STAR_URL, {
          method: "DELETE",
          headers: {
            "Accept": "application/vnd.github+json",
            "X-GitHub-Api-Version": "2022-11-28",
            "Authorization": `Bearer ${token}`,
            "User-Agent": "wolpoll/1.0 (web)"
          },
          cache: "no-store"
        });
        if (res.status === 204) {
          isStarred = false;
          renderButton();
          msg.textContent = "Unstarred!";
        } else if (res.status === 401) {
          msg.textContent = "401 Unauthorized — token invalid/expired or lacks scope.";
        } else if (res.status === 404) {
          isStarred = false;
          renderButton();
          msg.textContent = "Already unstarred (404).";
        } else {
          const text = await res.text();
          msg.textContent = `Failed to unstar: HTTP ${res.status} ${res.statusText} — ${text}`;
        }
      } catch (e) {
        msg.textContent = "Network error while unstarring.";
        console.error(e);
      } finally {
        btn.disabled = false;
      }
    }

    // --- Events ---
    btn.onclick = async () => {
      const token = getToken();
      if (!token) {
        msg.textContent = "No token available.";
        return;
      }
      const prev = isStarred;
      isStarred = !prev; // optimistic
      renderButton();
      if (!prev) await starGist(); else await unstarGist();
    };

    resetLink.onclick = (e) => {
      e.preventDefault();
      resetToken();
    };

    // --- Init ---
    getToken();      // stores token from URL once, then clears it from the address bar
    getStarStatus(); // reflect current star state
  })();
  </script>

  <!-- Register SW from root so it controls the whole origin -->
  <script>
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("/sw.js").catch(console.error);
    }
  </script>
</body>
</html>
