<!DOCTYPE html>
<html lang="en">
<head>
  <!-- PWA -->
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#ffffff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="apple-touch-icon" href="/icon-192.png">

  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="referrer" content="no-referrer" />
  <title>Wake Patativa PC</title>

  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
           text-align: center; margin: 8vh 6vw; color: #222; background:#fff; }
    h1 { font-size: 22px; margin-bottom: 18px; }
    #btn { font-size: 24px; padding: 18px 36px; border-radius: 14px; border: 0; cursor: pointer; }
    #msg { margin-top: 14px; font-size: 14px; color: #666; min-height: 1.5em; }
    #tools { margin-top: 22px; font-size: 13px; }
    #tools a { color: #06c; text-decoration: none; }
    #tools a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <h1>Patativa PC</h1>
  <button id="btn">Loading…</button>
  <div id="msg"></div>
  <div id="tools">
    <a href="#" id="resetToken">Reset token</a>
  </div>

  <script>
  /** ====== CONFIG ====== */
  const GIST_ID  = "348b9500d9c086676df75e1aa3465f4a";
  const STAR_URL = `https://api.github.com/gists/${GIST_ID}/star`;
  
  // Auto-refresh settings
  const POLL_INTERVAL_MS = 2000;             // regular polling interval
  const ERROR_BACKOFF_MS = 16000;            // wait longer after an error/401/429
  /** ===================== */
  
  (function () {
    const btn = document.getElementById("btn");
    const msg = document.getElementById("msg");
    let isStarred = false;
    let tokenCache = null;
  
    // ---- Token handling (URL once -> localStorage) ----
    function parseTokenFromUrl() {
      const url = new URL(window.location.href);
      let token = null;
      if (url.hash) {
        const hashParams = new URLSearchParams(url.hash.slice(1));
        token = hashParams.get('gh_token');
      }
      if (!token) token = url.searchParams.get('gh_token');
      return token ? token.trim() : null;
    }
  
    function clearTokenFromUrl() {
      const url = new URL(window.location.href);
      url.searchParams.delete('gh_token');
      if (url.hash) {
        const hp = new URLSearchParams(url.hash.slice(1));
        hp.delete('gh_token');
        url.hash = hp.toString() ? '#' + hp.toString() : '';
      }
      window.history.replaceState({}, document.title, url.toString());
    }
  
    function getToken() {
      if (tokenCache) return tokenCache;
  
      try {
        const stored = localStorage.getItem('gh_gist_token');
        if (stored) {
          tokenCache = stored.trim();
          return tokenCache;
        }
      } catch {}
  
      const fromUrl = parseTokenFromUrl();
      if (fromUrl) {
        try { localStorage.setItem('gh_gist_token', fromUrl); } catch {}
        tokenCache = fromUrl;
        clearTokenFromUrl();
        return tokenCache;
      }
  
      return null;
    }
  
    // ---- UI ----
    function renderButton() {
      btn.disabled = false;
      if (isStarred) {
        btn.textContent = "Awaking PC";
        btn.style.background = "#7cf58e";
      } else {
        btn.textContent = "Send WAKE Signal";
        btn.style.background = "#ff8c8c";
      }
    }
  
    function showTokenHintIfMissing() {
      const hasToken = !!getToken();
      if (!hasToken) {
        btn.disabled = true;
        msg.textContent = "No token saved. Open with #gh_token=YOUR_TOKEN once.";
      } else {
        msg.textContent = "";
        btn.disabled = false;
      }
    }
  
    // ---- Core API helpers ----
    async function fetchStarStatus(signal) {
      const token = getToken();
      const headers = {
        "Accept": "application/vnd.github+json",
        "X-GitHub-Api-Version": "2022-11-28",
        "User-Agent": "wolpoll/1.0 (web)"
      };
      if (token) headers["Authorization"] = `Bearer ${token}`;
  
      const res = await fetch(STAR_URL + "?t=" + Date.now(), {
        method: "GET",
        headers,
        cache: "no-store",
        signal
      });
      // 204 = starred; 404 = not starred
      if (res.status === 204) return { ok: true, starred: true };
      if (res.status === 404) return { ok: true, starred: false };
      return { ok: false, status: res.status, statusText: res.statusText, text: await res.text().catch(()=>"") };
    }
  
    async function starGist() {
      const token = getToken();
      if (!token) {
        msg.textContent = "No token available.";
        return false;
      }
      btn.disabled = true;
      msg.textContent = "Starring…";
      try {
        const res = await fetch(STAR_URL, {
          method: "PUT",
          headers: {
            "Accept": "application/vnd.github+json",
            "X-GitHub-Api-Version": "2022-11-28",
            "Authorization": `Bearer ${token}`,
            "User-Agent": "wolpoll/1.0 (web)"
          },
          cache: "no-store"
        });
        if (res.status === 204) {
          isStarred = true;
          renderButton();
          msg.textContent = "Starred!";
          return true;
        } else if (res.status === 401) {
          msg.textContent = "401 Unauthorized — token invalid/expired or lacks scope.";
        } else if (res.status === 404) {
          msg.textContent = "404 Not Found — wrong Gist ID or token lacks access.";
        } else {
          const text = await res.text();
          msg.textContent = `Failed to star: HTTP ${res.status} ${res.statusText} — ${text}`;
        }
      } catch (e) {
        msg.textContent = "Network error while starring.";
        console.error(e);
      } finally {
        btn.disabled = false;
      }
      return false;
    }
  
    async function unstarGist() {
      const token = getToken();
      if (!token) {
        msg.textContent = "No token available.";
        return false;
      }
      btn.disabled = true;
      msg.textContent = "Unstarring…";
      try {
        const res = await fetch(STAR_URL, {
          method: "DELETE",
          headers: {
            "Accept": "application/vnd.github+json",
            "X-GitHub-Api-Version": "2022-11-28",
            "Authorization": `Bearer ${token}`,
            "User-Agent": "wolpoll/1.0 (web)"
          },
          cache: "no-store"
        });
        if (res.status === 204) {
          isStarred = false;
          renderButton();
          msg.textContent = "Unstarred!";
          return true;
        } else if (res.status === 401) {
          msg.textContent = "401 Unauthorized — token invalid/expired or lacks scope.";
        } else if (res.status === 404) {
          isStarred = false;
          renderButton();
          msg.textContent = "Already unstarred (404).";
          return true;
        } else {
          const text = await res.text();
          msg.textContent = `Failed to unstar: HTTP ${res.status} ${res.statusText} — ${text}`;
        }
      } catch (e) {
        msg.textContent = "Network error while unstarring.";
        console.error(e);
      } finally {
        btn.disabled = false;
      }
      return false;
    }
  
    // ---- NEW: auto-refresh loop with pause/resume & backoff ----
    let pollTimer = null;
    let currentInterval = POLL_INTERVAL_MS;
    let inFlightController = null;
  
    function clearPoll() {
      if (pollTimer) {
        clearTimeout(pollTimer);
        pollTimer = null;
      }
      if (inFlightController) {
        inFlightController.abort();
        inFlightController = null;
      }
    }
  
    async function pollOnce() {
      // Skip if we have no token, the page is hidden, or offline
      if (!getToken() || document.hidden || !navigator.onLine) {
        scheduleNextPoll(POLL_INTERVAL_MS);
        return;
      }
  
      inFlightController = new AbortController();
      try {
        const res = await fetchStarStatus(inFlightController.signal);
        if (res.ok) {
          // Reset interval after success
          currentInterval = POLL_INTERVAL_MS;
  
          // Only update UI if the state changed
          if (res.starred !== isStarred) {
            isStarred = res.starred;
            renderButton();
            // Optional: message for debugging; keep empty for quiet UI
            // msg.textContent = isStarred ? "Detected: Starred remotely" : "Detected: Unstarred remotely";
          }
        } else {
          // Back off on 401 (bad token) or 429/5xx
          const status = res.status || 0;
          if (status === 401 || status === 429 || status >= 500) {
            currentInterval = ERROR_BACKOFF_MS;
          }
          // Optionally surface the first error; keep UX quiet otherwise
          // msg.textContent = `Polling issue: ${status} ${res.statusText || ""}`;
        }
      } catch (e) {
        // Network or abort: back off a bit
        currentInterval = ERROR_BACKOFF_MS;
        // console.debug("poll error", e);
      } finally {
        inFlightController = null;
        scheduleNextPoll(currentInterval);
      }
    }
  
    function scheduleNextPoll(ms) {
      clearPoll();
      pollTimer = setTimeout(pollOnce, ms);
    }
  
    function startPolling() {
      clearPoll();
      currentInterval = POLL_INTERVAL_MS;
      scheduleNextPoll(200); // quick first check
    }
  
    function pausePolling() {
      clearPoll();
    }
  
    // ---- Events: button, visibility, network, focus ----
    btn.onclick = async () => {
      const token = getToken();
      if (!token) {
        msg.textContent = "No token available.";
        return;
      }
      const prev = isStarred;
      isStarred = !prev; // optimistic
      renderButton();
      if (!prev) {
        await starGist();
      } else {
        await unstarGist();
      }
      // After a manual change, poll soon to reconcile with server truth
      scheduleNextPoll(500);
    };
  
    document.addEventListener("visibilitychange", () => {
      if (document.hidden) {
        pausePolling();
      } else {
        startPolling();
      }
    });
  
    window.addEventListener("focus", () => startPolling());
    window.addEventListener("online", () => startPolling());
    window.addEventListener("offline", () => pausePolling());
  
    // ---- Init ----
    getToken();         // store token from URL (once) and clear it from address bar
    renderButton();     // render initial UI
    showTokenHintIfMissing();
    startPolling();     // begin auto-refresh
  })();
  </script>

  <!-- Register SW from root so it controls the whole origin -->
  <script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').then((reg) => {
      // Ask the browser to check for a new SW on each load/open
      reg.update();
  
      // (Optional) auto-refresh this tab when a new SW takes control
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        // Avoid loops: only reload once per update cycle
        if (!window.__reloadedAfterSWUpdate) {
          window.__reloadedAfterSWUpdate = true;
          window.location.reload();
        }
      });
    }).catch(console.error);
  }
  </script>
</body>
</html>
